<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ — 無料見積もり | 神山 裕貴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <main class="contact-page">
    <a class="contact-back" href="index.html#workflow">← トップに戻る</a>

    <div class="contact-brand">
      <img src="images/kohyama-dri-logo.png" width="200" height="120" alt="KOHYAMA DIGITAL RESEARCH INSTITUTE ロゴ" loading="lazy" decoding="async" />
      <div class="contact-brand-text">
        <p class="contact-owner-name">神山 裕貴</p>
        <p class="contact-owner-role">Portfolio · お問い合わせ</p>
      </div>
    </div>

    <p class="contact-eyebrow">CONTACT</p>
    <h1 class="contact-title">無料見積もりのご依頼</h1>
    <p class="contact-lead">
      フォームに必要事項を入力して送信してください。24時間以内にご連絡いたします。
    </p>

    <form class="contact-form-card" id="estimate-form" novalidate>
      <div class="contact-field" data-field="name">
        <label class="contact-label" for="f-name">お名前 <span class="req" aria-hidden="true">*</span></label>
        <input class="contact-input" type="text" id="f-name" name="name" autocomplete="name" placeholder="山田 太郎" required />
        <p class="contact-error" role="alert">入力してください。</p>
      </div>
      <div class="contact-field" data-field="phone">
        <label class="contact-label" for="f-phone">お電話番号 <span class="req" aria-hidden="true">*</span></label>
        <input class="contact-input" type="tel" id="f-phone" name="phone" autocomplete="tel" inputmode="tel" placeholder="090-xxxx-xxxx" required />
        <p class="contact-error" role="alert">入力してください。</p>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="f-email">メールアドレス</label>
        <input class="contact-input" type="email" id="f-email" name="email" autocomplete="email" inputmode="email" placeholder="example@email.com" />
      </div>
      <div class="contact-field" data-field="service">
        <label class="contact-label" for="f-service">ご希望のサービス <span class="req" aria-hidden="true">*</span></label>
        <select class="contact-select" id="f-service" name="service" required>
          <option value="">サービスを選択</option>
          <option value="画像生成">画像生成</option>
          <option value="LINEスタンプ作成">LINEスタンプ作成</option>
          <option value="AIライティング">AIライティング</option>
          <option value="スライド資料作成">スライド資料作成</option>
          <option value="LP作成">LP作成</option>
          <option value="サイト作成">サイト作成</option>
          <option value="ホームページ作成">ホームページ作成</option>
          <option value="チャットボット作成">チャットボット作成</option>
          <option value="企業ロゴ・ブランディング">企業ロゴ・ブランディング</option>
          <option value="その他">その他</option>
        </select>
        <p class="contact-error" role="alert">選択してください。</p>
      </div>
      <div class="contact-field">
        <label class="contact-label" for="f-body">ご相談内容・ご要望</label>
        <textarea
          class="contact-textarea"
          id="f-body"
          name="body"
          placeholder="例：ご希望サービスを選択後、目的・ターゲット・ご希望納期をご記入ください。"
        ></textarea>
      </div>
      <div class="contact-submit-wrap">
        <button type="submit" class="contact-submit">無料見積もりを送信する →</button>
      </div>
      <p class="contact-footnote">
        ※ 送信後24時間以内にご連絡いたします。<br />
        土日祝も受付・対応しております。
      </p>
    </form>

    <p class="contact-mail-note">
      返信先メール：<a href="mailto:info@digital2026.net">info@digital2026.net</a>
    </p>
  </main>

  <footer class="site-footer">
    <p>© 2026 神山 裕貴</p>
  </footer>

  <script>
    (function () {
      var form = document.getElementById("estimate-form");
      var to = "info@digital2026.net";
      var serviceSelect = document.getElementById("f-service");
      var bodyField = document.getElementById("f-body");

      var bodyPlaceholderByService = {
        "": "例：ご希望サービスを選択後、目的・ターゲット・ご希望納期をご記入ください。",
        "画像生成": "例：画像生成をお願いしたいです。SNS投稿用に3案ほしいです。ターゲットは20〜30代女性で、納期は今月末希望です。",
        "LINEスタンプ作成": "例：LINEスタンプ作成をお願いしたいです。日常で使える40個セットを希望しています。親しみやすいテイストで相談したいです。",
        "AIライティング": "例：AIライティングをお願いしたいです。サービス紹介記事を月4本作成したく、SEOを意識した構成から相談したいです。",
        "スライド資料作成": "例：スライド資料作成をお願いしたいです。営業提案用で10〜15枚程度を想定しており、伝わりやすい構成にしたいです。",
        "LP作成": "例：LP作成をお願いしたいです。新サービスの申込み数を増やしたく、構成提案からデザイン・実装まで相談したいです。",
        "サイト作成": "例：サイト作成をお願いしたいです。目的はお問い合わせ数の増加で、ターゲットに合わせた構成提案・デザイン・実装まで一貫して相談したいです。",
        "ホームページ作成": "例：ホームページ作成をお願いしたいです。会社案内と実績を掲載し、信頼感が伝わるデザインで制作したいです。",
        "チャットボット作成": "例：チャットボット作成をお願いしたいです。よくある質問対応を自動化し、問い合わせ対応の負担を減らしたいです。",
        "企業ロゴ・ブランディング": "例：企業ロゴ・ブランディングをお願いしたいです。事業の強みが伝わるロゴと、名刺やWebで使える展開案を相談したいです。",
        "その他": "例：ご相談したい内容をご記入ください。目的・現状の課題・ご希望納期を共有いただけるとスムーズです。"
      };

      function updateBodyPlaceholder() {
        var service = serviceSelect.value;
        var next = bodyPlaceholderByService[service] || bodyPlaceholderByService[""];
        bodyField.setAttribute("placeholder", next);
      }

      function clearErrors() {
        form.querySelectorAll(".contact-field.has-error").forEach(function (el) {
          el.classList.remove("has-error");
        });
      }

      function showError(fieldName) {
        var wrap = form.querySelector('.contact-field[data-field="' + fieldName + '"]');
        if (wrap) wrap.classList.add("has-error");
      }

      serviceSelect.addEventListener("change", updateBodyPlaceholder);
      updateBodyPlaceholder();

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        clearErrors();

        var name = document.getElementById("f-name").value.trim();
        var phone = document.getElementById("f-phone").value.trim();
        var email = document.getElementById("f-email").value.trim();
        var service = document.getElementById("f-service").value;
        var body = document.getElementById("f-body").value.trim();

        var ok = true;
        if (!name) {
          showError("name");
          ok = false;
        }
        if (!phone) {
          showError("phone");
          ok = false;
        }
        if (!service) {
          showError("service");
          ok = false;
        }
        if (!ok) return;

        var text =
          "【無料見積もりのご依頼】\r\n\r\n" +
          "お名前: " +
          name +
          "\r\n" +
          "お電話番号: " +
          phone +
          "\r\n" +
          "メールアドレス: " +
          (email || "（未入力）") +
          "\r\n" +
          "ご希望のサービス: " +
          service +
          "\r\n\r\n" +
          "ご相談内容・ご要望:\r\n" +
          (body || "（なし）") +
          "\r\n";

        var subject = encodeURIComponent("無料見積もりのご依頼");
        var bodyEnc = encodeURIComponent(text);
        window.location.href = "mailto:" + to + "?subject=" + subject + "&body=" + bodyEnc;
      });
    })();
  </script>
</body>
</html>
